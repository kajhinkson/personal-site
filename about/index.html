  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    function App() {
      const [theme, setTheme] = useState(() => localStorage.getItem("kh-theme") || "light");
      useEffect(() => {
        localStorage.setItem("kh-theme", theme);
        document.body.style.background = theme === "dark" ? "#1a1612" : "#f0e9dc";
      }, [theme]);
      return <AboutPage theme={theme} setTheme={setTheme} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
